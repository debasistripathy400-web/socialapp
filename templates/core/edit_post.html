{% extends 'base.html' %}

{% block title %}Edit Post - SocialApp{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 40px auto; padding: 24px;">
    <h2 style="margin-bottom: 24px; font-weight: 700; color: var(--primary-color);">Edit Caption</h2>
    
    <div style="display: flex; align-items: center; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid #eee;">
        <img src="{{ post.user.profile_picture.url }}" style="width: 40px; height: 40px; border-radius: 50%; margin-right: 12px; object-fit: cover;">
        <span style="font-weight: 700;">{{ post.user.username }}</span>
    </div>

    {% if post.image %}
    <img src="{{ post.image.url }}" style="width: 100%; border-radius: 8px; margin-bottom: 20px; max-height: 300px; object-fit: cover;">
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <div class="form-group" style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #555;">Caption</label>
            <textarea name="caption" class="form-control" rows="4" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; resize: none;">{{ post.caption }}</textarea>
        </div>
        
        <div style="display: flex; gap: 12px;">
            <button type="submit" class="btn-primary" style="flex: 1; padding: 12px;">Update Post</button>
            <a href="{% url 'home' %}" class="btn-secondary" style="flex: 1; text-align: center; padding: 12px; text-decoration: none; border-radius: 8px; background: #f0f2f5; color: #333;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
