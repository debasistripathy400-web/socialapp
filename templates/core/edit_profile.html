{% extends 'base.html' %}
{% load static %}

{% block title %}Edit Profile - SocialApp{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 40px auto; padding: 30px;">
    <h1 style="font-size: 24px; font-weight: 700; color: var(--primary-color); margin-bottom: 20px; text-align: center;">Edit Profile</h1>
    
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        
        <div class="form-group">
            <label style="display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px;">Profile Picture</label>
            {{ form.profile_picture }}
        </div>

        <div class="form-group">
            <label style="display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px;">Bio</label>
            {{ form.bio }}
        </div>

        <div class="form-group" style="background: var(--bg-color); padding: 15px; border-radius: var(--border-radius); display: flex; align-items: center; justify-content: space-between; margin-top: 20px;">
            <div>
                <label style="display: block; font-weight: 600; font-size: 15px; color: var(--primary-color);">Private Account</label>
                <p style="font-size: 11px; color: var(--gray-color); margin-top: 2px;">Only your followers can see your posts and stories.</p>
            </div>
            <div class="form-check form-switch">
                {{ form.is_private }}
            </div>
        </div>

        <button type="submit" class="btn-primary" style="width: 100%; margin-top: 30px; padding: 14px;">Save Changes</button>
    </form>
</div>
{% endblock %}
